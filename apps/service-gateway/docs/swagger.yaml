          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取销售订单列表
      tags:
      - 销售管理
    post:
      consumes:
      - application/json
      description: 创建一个新的销售订单及其行项目
      parameters:
      - description: 销售订单数据
        in: body
        name: order
        required: true
