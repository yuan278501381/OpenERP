      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取生产订单列表
      tags:
      - 生产管理
    post:
      consumes:
      - application/json
      description: 创建一个新的生产订单
      parameters:
      - description: 生产订单数据
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/models.SysProductionOrder'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 创建生产订单
      tags:
      - 生产管理
  /openerp/v1/production-orders/{id}:
    delete:
      consumes:
