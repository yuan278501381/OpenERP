      description: 删除生产订单
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 删除生产订单
      tags:
      - 生产管理
    put:
      consumes:
      - application/json
      description: 更新生产订单
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      - description: 生产订单数据
        in: body
        name: order
        required: true
