      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 创建组织架构
      tags:
      - Organization
  /openerp/v1/organizations/{id}:
    delete:
      description: 删除指定的组织架构节点
      parameters:
      - description: 组织ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 删除组织架构
      tags:
      - Organization
    put:
      consumes:
      - application/json
      description: 更新现有的组织架构节点
      parameters:
      - description: 组织ID
        in: path
        name: id
        required: true
        type: integer
      - description: 组织架构信息
        in: body
        name: organization
        required: true
