      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 创建总账科目
      tags:
      - GLAccount
  /openerp/v1/gl-accounts/{id}:
    delete:
      description: 删除指定的总账科目
      parameters:
      - description: 科目ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 删除总账科目
      tags:
      - GLAccount
    put:
      consumes:
      - application/json
      description: 更新现有的总账科目
      parameters:
      - description: 科目ID
        in: path
        name: id
        required: true
        type: integer
      - description: 总账科目信息
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/models.SysGLAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 更新总账科目
      tags:
      - GLAccount
  /openerp/v1/materials:
    get:
      consumes:
      - application/json
      description: 从数据库拉取全部的物料主数据，支持包含基于 JSONB 的动态扩展字段。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取物料主数据列表
      tags:
      - 物料管理 (Material Master)
  /openerp/v1/organizations:
    get:
      description: 获取组织架构列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取组织架构列表
      tags:
      - Organization
    post:
      consumes:
      - application/json
      description: 创建一个新的组织架构节点
      parameters:
      - description: 组织架构信息
        in: body
        name: organization
        required: true
